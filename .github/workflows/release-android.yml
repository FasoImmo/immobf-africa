name: Build & Release APK Android

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-release:
    name: Build APK et publier sur GitHub Releases
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write  # Nécessaire pour créer des GitHub Releases

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installer EAS CLI (via npm)
        run: npm install -g eas-cli

      - name: Installer les dépendances
        working-directory: ./mobile
        run: npm install

      - name: Lancer le build APK sur EAS
        working-directory: ./mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Démarrage du build EAS (profil: apk)..."
          eas build \
            --platform android \
            --profile apk \
            --non-interactive \
            --wait \
            --json 2>/dev/null > build-result.json

          APK_URL=$(cat build-result.json | jq -r '.[0].artifacts.buildUrl')
          echo "APK_URL=$APK_URL" >> $GITHUB_ENV
          echo "Build terminé. URL: $APK_URL"

      - name: Télécharger le fichier APK
        run: |
          curl -L "${{ env.APK_URL }}" -o immobf-africa.apk
          ls -lh immobf-africa.apk

      - name: Publier la GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ImmoBF Africa ${{ github.ref_name }}
          body: |
            ## ImmoBF Africa ${{ github.ref_name }}

            ### Installation
            1. Télécharge `immobf-africa.apk` ci-dessous
            2. Android : Paramètres → Sécurité → Autoriser sources inconnues
            3. Ouvre le fichier pour installer

            > URL permanente : https://github.com/${{ github.repository }}/releases/latest/download/immobf-africa.apk
          files: immobf-africa.apk
          fail_on_unmatched_files: true
