name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: immobf
          POSTGRES_PASSWORD: immobf_dev
          POSTGRES_DB: immobf_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U immobf"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install
        run: cd backend && npm ci
      - name: Lint
        run: cd backend && npm run lint
      - name: Migrate
        run: cd backend && npm run migrate
        env:
          DATABASE_URL: postgres://immobf:immobf_dev@localhost:5432/immobf_test
      - name: Test
        run: cd backend && npm test
        env:
          DATABASE_URL: postgres://immobf:immobf_dev@localhost:5432/immobf_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci_secret

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-web/package-lock.json
      - name: Install
        run: cd frontend-web && npm ci
      - name: Lint
        run: cd frontend-web && npm run lint
      - name: Test
        run: cd frontend-web && npm test -- --ci --passWithNoTests
      - name: Build
        run: cd frontend-web && npm run build

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - name: Install
        run: cd mobile && npm ci
      - name: Test
        run: cd mobile && npm test -- --ci --passWithNoTests
