name: Deploy frontend (Vercel)

on:
  push:
    branches: [main]
    paths:
      - "frontend-web/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: frontend-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --ci --passWithNoTests

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel env (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN missing"
            exit 1
          fi
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build with Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $DEPLOY_URL"

      - name: Smoke test deployed URL
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
        run: |
          for i in $(seq 1 12); do
            if curl -fsS "$DEPLOY_URL" > /dev/null; then
              echo "Frontend reachable ✅ at $DEPLOY_URL"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Frontend not reachable"
          exit 1
