name: Deploy backend (Railway)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: immobf
          POSTGRES_PASSWORD: immobf_dev
          POSTGRES_DB: immobf_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U immobf"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Run migrations on test DB
        working-directory: backend
        env:
          DATABASE_URL: postgres://immobf:immobf_dev@localhost:5432/immobf_test
        run: npm run migrate

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://immobf:immobf_dev@localhost:5432/immobf_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci_secret
          NODE_ENV: test
        run: npm test

      # ---------- Deploy to Railway ----------
      - name: Install Railway CLI
        if: success()
        run: npm i -g @railway/cli@3

      - name: Deploy to Railway
        if: success()
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_BACKEND_SERVICE }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is missing — set it in repo settings"
            exit 1
          fi
          railway up --service "$RAILWAY_SERVICE" --detach

      # ---------- Smoke test post-deploy ----------
      - name: Wait for backend health
        if: success()
        env:
          API_URL: ${{ secrets.PUBLIC_API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "::warning::PUBLIC_API_URL not set — skipping smoke test"
            exit 0
          fi
          for i in $(seq 1 30); do
            if curl -fsS "$API_URL/api/v1/health" > /dev/null; then
              echo "Backend healthy ✅"
              exit 0
            fi
            echo "Waiting for backend... attempt $i/30"
            sleep 10
          done
          echo "::error::Backend health check failed after 5 minutes"
          exit 1
